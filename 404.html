<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghostland Donations</title>
<style>
:root{--bg:#fff;--text:#111;--card:#f3f3f3}
@media(prefers-color-scheme:dark){:root{--bg:#0d0d0d;--text:#f5f5f5;--card:#1a1a1a}}
body.dark{--bg:#0d0d0d;--text:#f5f5f5;--card:#1a1a1a}
body.light{--bg:#fff;--text:#111;--card:#f3f3f3}
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;height:100vh}
.box{background:var(--card);padding:30px;border-radius:12px;text-align:center;max-width:420px}
button{margin-top:15px;padding:8px 14px;border:none;border-radius:6px;background:var(--text);color:var(--bg);cursor:pointer}
</style>
</head>
<body>
<div class="box">
<h1>Donations Unavailable</h1>
<p>Our payment system is currently under maintenance as we deploy a new system.</p>
<p>Please come back in a few hours.</p>
<button onclick="t()">Toggle theme</button>
</div>
<script>
function t(){
let b=document.body
b.classList.toggle('dark')
b.classList.toggle('light')}
</script></body></html>
