<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghostland Payments</title>

<style>
:root{
--bg:#000;
--card:#111;
--text:#f5f5f7;
--sub:#86868b;
--accent:#ffffff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:480px;
background:var(--card);
border-radius:18px;
padding:32px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h1{
font-size:1.6rem;
margin:0 0 12px;
font-weight:600;
}

p{
margin:6px 0;
color:var(--sub);
font-size:0.95rem;
}

.loader{
margin:24px auto;
width:36px;
height:36px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.15);
border-top:2px solid var(--accent);
animation:spin 1s linear infinite;
}

button{
margin-top:18px;
padding:12px 18px;
border-radius:999px;
border:none;
background:#fff;
color:#000;
font-weight:500;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:0.85;
}

select{
margin-top:16px;
background:#000;
color:#fff;
border:1px solid #333;
padding:8px;
border-radius:8px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">
<h1 id="title"></h1>
<p id="line1"></p>
<p id="line2"></p>

<div class="loader"></div>

<p id="countdown"></p>

<button onclick="goNow()" id="btn"></button>

<br>
<select id="lang" onchange="setLang(this.value)"></select>
</div>

<script>
const url = "https://pay.ghostland.at";
let time = 6;

const t={
en:["New Payment System","Our new donation platform is now live.","Redirecting...","Go now"],
fr:["Nouveau système de paiement","Notre nouvelle plateforme de dons est disponible.","Redirection...","Accéder maintenant"],
es:["Nuevo sistema de pago","Nuestra nueva plataforma de donaciones ya está disponible.","Redirigiendo...","Ir ahora"],
de:["Neues Zahlungssystem","Unsere neue Spendenplattform ist jetzt live.","Weiterleitung...","Jetzt öffnen"],
ru:["Новая платёжная система","Новая платформа пожертвований уже доступна.","Перенаправление...","Перейти"],
ja:["新しい決済システム","新しい寄付プラットフォームが利用可能です。","リダイレクト中...","今すぐ移動"],
pt:["Novo sistema de pagamento","Nossa nova plataforma de doações já está disponível.","Redirecionando...","Ir agora"],
pl:["Nowy system płatności","Nowa platforma darowizn jest już dostępna.","Przekierowanie...","Przejdź"],
zh:["新的支付系统","我们的新捐赠平台现已上线。","正在跳转...","立即前往"],
it:["Nuovo sistema di pagamento","La nuova piattaforma di donazioni è disponibile.","Reindirizzamento...","Vai ora"],
nl:["Nieuw betalingssysteem","Ons nieuwe donatieplatform is nu beschikbaar.","Doorsturen...","Ga nu"],
tr:["Yeni ödeme sistemi","Yeni bağış platformumuz artık aktif.","Yönlendiriliyor...","Hemen git"],
ko:["새 결제 시스템","새로운 후원 플랫폼이 이제 활성화되었습니다.","이동 중...","지금 이동"],
ar:["نظام دفع جديد","منصة التبرعات الجديدة متاحة الآن.","جارٍ إعادة التوجيه...","انتقل الآن"],
sv:["Nytt betalningssystem","Vår nya donationsplattform är nu live.","Omdirigerar...","Gå nu"]
}

function setLang(l){
document.getElementById("title").textContent=t[l][0]
document.getElementById("line1").textContent=t[l][1]
document.getElementById("line2").textContent=t[l][2]
document.getElementById("btn").textContent=t[l][3]
updateCountdown(l)
document.getElementById("lang").value=l
localStorage.setItem("lang",l)
}

function updateCountdown(l){
document.getElementById("countdown").textContent =
t[l][2] + " " + time + "s";
}

function detectLang(){
let langs=navigator.languages||[navigator.language]
for(let lang of langs){
let l=lang.slice(0,2)
if(t[l]) return l
}
return "en"
}

function populate(){
let s=document.getElementById("lang")
for(let k in t){
let o=document.createElement("option")
o.value=k
o.textContent=k.toUpperCase()
s.appendChild(o)
}
}

function goNow(){
window.location.href = url;
}

setInterval(()=>{
time--;
let l = localStorage.getItem("lang")||detectLang()
updateCountdown(l)

if(time<=0){
window.location.href = url;
}
},1000)

populate()
setLang(localStorage.getItem("lang")||detectLang())
</script>

</body>
</html>
