<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghostland Donations</title>
<style>
:root{--bg:#ffffff;--text:#111;--card:#f2f2f2}
@media(prefers-color-scheme:dark){:root{--bg:#0d0d0d;--text:#f5f5f5;--card:#1a1a1a}}
body.dark{--bg:#0d0d0d;--text:#f5f5f5;--card:#1a1a1a}
body.light{--bg:#ffffff;--text:#111;--card:#f2f2f2}
body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box}
.box{background:var(--card);padding:25px;border-radius:14px;text-align:center;width:100%;max-width:480px}
h1{font-size:1.4rem;margin-bottom:10px}
p{font-size:0.95rem;opacity:.85}
select,button{margin-top:12px;padding:8px 12px;border-radius:8px;border:none;font-size:.9rem}
button{background:var(--text);color:var(--bg);cursor:pointer}
</style>
</head>
<body>
<div class="box">
<h1 id="title"></h1>
<p id="line1"></p>
<p id="line2"></p>
<select onchange="setLang(this.value)">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="es">Español</option>
<option value="de">Deutsch</option>
<option value="ru">Русский</option>
<option value="ja">日本語</option>
<option value="pt">Português</option>
<option value="pl">Polski</option>
<option value="zh">中文</option>
</select>
<br>
<button onclick="toggleTheme()">Theme</button>
</div>

<script>
const t={
en:["Donations Unavailable","Our payment system is currently under maintenance as we deploy a new system.","Please come back in a few hours."],
fr:["Dons indisponibles","Le système de paiement est en maintenance pour déployer une nouvelle version.","Veuillez revenir dans quelques heures."],
es:["Donaciones no disponibles","El sistema de pago está en mantenimiento mientras desplegamos uno nuevo.","Vuelve en unas horas."],
de:["Spenden nicht verfügbar","Das Zahlungssystem wird gewartet, während ein neues System bereitgestellt wird.","Bitte in ein paar Stunden wiederkommen."],
ru:["Пожертвования недоступны","Платежная система на обслуживании, мы внедряем новую версию.","Пожалуйста, зайдите через несколько часов."],
ja:["寄付は現在利用できません","新しいシステム導入のため決済はメンテナンス中です。","数時間後に再度お試しください。"],
pt:["Doações indisponíveis","O sistema de pagamento está em manutenção enquanto implantamos um novo.","Volte em algumas horas."],
pl:["Darowizny niedostępne","System płatności jest w trakcie konserwacji, wdrażamy nowy system.","Wróć za kilka godzin."],
zh:["暂时无法捐赠","支付系统正在维护，我们正在部署新系统。","请稍后再试。"]
}

function setLang(l){
document.getElementById("title").textContent=t[l][0]
document.getElementById("line1").textContent=t[l][1]
document.getElementById("line2").textContent=t[l][2]
localStorage.setItem("lang",l)
}

function toggleTheme(){
document.body.classList.toggle("dark")
document.body.classList.toggle("light")
}

setLang(localStorage.getItem("lang")||"en")
</script>
</body>
</html>
